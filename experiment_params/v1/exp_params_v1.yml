# experiment parameters

# Example mq params
# mq2: {"type": "mq",
#         "freq": 5,         # frequency of alternations 
#         "cycles": 50,      # nr of cycles (one cycle is one of each positions)
#         "center": [0, 0],  # middle point
#         "dot_size": 10,   # in px
#         "dist_hor_start": 80,  # in px
#         "dist_ver_start": 100,  # in px
#         "init_pos": "ru", # left up (or ru)
#         "start_frame": 0, # at what point of the display does it appear
#         "disamb": "hor"    # "hor", "ver" or None for disambiguation
#         }


# !!! Trial identifiers: first come inst then exp !!!

# Instructions. ALL instruction trials must contain "inst" in trial identifier!!

text1:
  trial_identifier: "inst_text_1" # inst
  trial_type: "text"
  continue: "space"
  content: "exp_text_1"
  pos: [0, 0]
  size: 0.1



